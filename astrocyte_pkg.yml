name: '3d_deskew_gpu'
author: 'Ricky Wang'
email: 'ricky.wang@utsouthwestern.edu'
title: '3D GPU Deskew Workflow'
description: |
  This workflow normalizes selected ctASLM/light-sheet microscopy image files
  to OME-Zarr and runs GPU-accelerated deskewing. Use the separate
  deconvolution-gpu package for blind PSF estimation and deconvolution.

citation: |
  Please acknowledge our contribution:
  This research was supported in part by the computational resources provided by
  the BioHPC supercomputing facility located in the Lyda Hill Department of
  Bioinformatics, UT Southwestern Medical Center.

minimum_astrocyte_version: '2.1.0'
nextflow_version: '24.10.0'
nextflow_config: 'biohpc.config'
container: 'singularity'
singularity_version: '3.9.9'

documentation_files:
  - [ 'index.md', '3D GPU Deskew Help' ]
  - [ 'workflow-overview.md', 'Workflow Overview' ]
  - [ 'deskew-process.md', 'Deskew Process' ]
  - [ 'profiles-and-parameters.md', 'Profiles and Parameters' ]
  - [ 'workflow-output.md', 'workflow/output - Output from the Workflow' ]
  - [ 'outputs-and-troubleshooting.md', 'Outputs and Troubleshooting' ]

workflow_modules:
  - 'singularity/3.9.9'
  - 'cuda/11.8.0'

workflow_containers:
  - docker://git.biohpc.swmed.edu:5050/dean-lab/ctaslm2-deskew:0.1.0

workflow_parameters:
  - id: input
    type: files
    required: true
    min: 1
    description: |
      Select ctASLM/light-sheet microscopy image files to deskew.
    regex: ".*(\\.tif|\\.tiff|\\.czi|\\.nd2|\\.lif|\\.h5|\\.hdf5|\\.ome\\.zarr|\\.ozx|\\.TIF|\\.TIFF|\\.CZI|\\.ND2|\\.LIF|\\.H5|\\.HDF5|\\.OME\\.ZARR|\\.OZX)$"

  - id: output_formats
    type: select
    required: false
    default: 'ozx'
    description: |
      Final image output format to publish. OZX is a zipped OME-Zarr archive
      that Astrocyte can stage and export as a file. Choose TIFF to publish
      OZX plus one merged TIFF stack.
    choices:
      - [ 'ozx', 'Zipped OME-Zarr archive output' ]
      - [ 'tiff', 'OZX plus merged TIFF stack export' ]

  - id: pyramid_max_downsample
    type: select
    required: true
    default: '16'
    description: |
      Maximum XY downsampling level for OME-Zarr multiscale pyramid output.
      Level 0 is full resolution; higher levels downsample rows and columns by
      the selected factor while preserving Z resolution.
    choices:
      - [ '1', 'Full resolution only' ]
      - [ '2', 'Build 2x pyramid level' ]
      - [ '4', 'Build up to 4x pyramid levels' ]
      - [ '8', 'Build up to 8x pyramid levels' ]
      - [ '16', 'Build up to 16x pyramid levels' ]

  - id: dx
    type: real
    required: true
    min: 0
    description: Deskew voxel size in X/Y, in microns.

  - id: dz
    type: real
    required: true
    min: 0
    description: Deskew voxel size in Z, in microns.

  - id: angle
    type: real
    required: true
    default: 0
    description: Deskew shear angle in degrees.

  - id: flip
    type: integer
    required: false
    default: 1
    description: Deskew flip/orientation flag.

  - id: deskew_backend
    type: select
    required: true
    default: 'gpu'
    description: Deskew implementation backend.
    choices:
      - [ 'gpu', 'GPU deskew' ]
      - [ 'cpu_blocked', 'CPU blocked reference (SLOW)' ]

  - id: deskew_geometry
    type: select
    required: false
    default: 'clearex_affine'
    description: Deskew geometry model.
    choices:
      - [ 'clearex_affine', 'ClearEx affine geometry' ]
      - [ 'top_view', 'MATLAB top-view geometry' ]

  - id: deskew_output_dtype
    type: select
    required: false
    default: 'uint16'
    description: |
      Deskew output dtype. Use float32 with ClearEx affine geometry to match
      ClearEx interpolation output.
    choices:
      - [ 'uint16', 'uint16' ]
      - [ 'float32', 'float32' ]

  - id: z_chunk
    type: integer
    required: false
    default: 256
    min: 1
    description: Number of output Z samples processed per CPU sampling tile.

  - id: deskew_prefetch
    type: integer
    required: false
    default: 64
    min: 1
    description: Number of output X pages processed in each GPU batch.
