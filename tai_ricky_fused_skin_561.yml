# Params file for the Tai/Ricky fused-skin 561 nm deskew test.
# Run with:
#   nextflow run workflow/main.nf -c workflow/configs/biohpc.config \
#     -params-file tai_ricky_fused_skin_561.yml
#
# Optical metadata for downstream deconvolution/reference:
#   emission_nm: 595
#   numerical_aperture: 0.7
#   refractive_index: 1.33333

input:
  - /endosome/archive/bioinformatics/Danuser_lab/Dean/Tai_ricky/fused_skin_561.tif

output_dir: ./workflow/output/tai_ricky_fused_skin_561

dx: 0.168
dz: 0.2
angle: 45
flip: 1

deskew_backend: gpu
deskew_prefetch: 8

# Reuse the existing built runtime when available. Remove or set this to an
# empty string if Astrocyte should build the workflow runtime from scratch.
deskew_runtime_dir: /endosome/work/bioinformatics/s249154/decon_env
